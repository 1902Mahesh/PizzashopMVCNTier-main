<!-- Button to Open Modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addMenuItemModal">
    + New Item
</button>

<!-- Add Menu Item Modal -->
<div class="modal fade" id="addMenuItemModal" tabindex="-1" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Add New Menu Item</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <form id="menuItemForm">
                    <div class="row g-3">
                        <!-- Category & Name -->
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select class="form-select">
                                <option>Sandwich</option>
                                <option>Pasta</option>
                                <option>Pizza</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" placeholder="Enter name" required>
                        </div>

                        <!-- Item Type & Rate -->
                        <div class="col-md-4">
                            <label class="form-label">Item Type</label>
                            <select class="form-select">
                                <option>Select a type</option>
                                <option>Veg</option>
                                <option>Non-Veg</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Rate</label>
                            <input type="number" class="form-control" value="0" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Quantity</label>
                            <input type="number" class="form-control" value="0">
                        </div>

                        <!-- Unit Selection -->
                        <div class="col-md-4">
                            <label class="form-label">Unit</label>
                            <select class="form-select">
                                <option>Select a unit</option>
                                <option>Piece</option>
                                <option>Kg</option>
                            </select>
                        </div>

                        <!-- Toggle Switches -->
                        <div class="col-md-4 d-flex align-items-center">
                            <label class="form-label me-2">Available</label>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" checked>
                            </div>
                        </div>
                        <div class="col-md-4 d-flex align-items-center">
                            <label class="form-label me-2">Default Tax</label>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox">
                            </div>
                        </div>

                        <!-- Tax Percentage & Short Code -->
                        <div class="col-md-6">
                            <label class="form-label">Tax Percentage</label>
                            <input type="number" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Short Code</label>
                            <input type="text" class="form-control">
                        </div>

                        <!-- Description -->
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="2"></textarea>
                        </div>

                        <!-- Upload Image -->
                        <div class="col-12">
                            <label class="form-label">Upload Image</label>
                            <div class="border p-3 text-center">
                                <input type="file" class="form-control" style="display: none;" id="uploadFile">
                                <label for="uploadFile" class="d-block">📂 Drag and Drop or Browse files</label>
                            </div>
                        </div>

                        <!-- Modifier Groups -->
                        <div class="col-12">
                            <label class="form-label">Select Modifier Group(s)</label>
                            <select class="form-select">
                                <option>None</option>
                                <option>Extra Cheese</option>
                                <option>Spicy</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>
